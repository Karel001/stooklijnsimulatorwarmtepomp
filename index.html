<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Stooklijn + Warmtepomp Simulator</title>

<script src="https://cdn.jsdelivr.net/npm/vue@2"></script>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/flot/0.8.3/jquery.flot.min.js"></script>

<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;600&family=IBM+Plex+Mono&display=swap');

  :root {
    --bg: #f4f1ec;
    --panel: #ffffff;
    --border: #d0c9bb;
    --text: #1a1a1a;
    --accent: #c0392b;
    --green: #27ae60;
    --orange: #e67e22;
    --muted: #7a7060;
    --radius: 6px;
  }

  * { box-sizing: border-box; }

  body {
    font-family: 'IBM Plex Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    margin: 0;
    padding: 24px;
  }

  h2 {
    font-size: 1.3rem;
    font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    border-bottom: 2px solid var(--accent);
    padding-bottom: 8px;
    margin-bottom: 20px;
    color: var(--accent);
  }

  h3 {
    font-size: 0.75rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    margin: 0 0 6px;
  }

  .container {
    display: flex;
    gap: 28px;
    align-items: flex-start;
  }

  /* ── Inputs panel ── */
  .inputs {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    min-width: 210px;
  }

  .input-group {
    margin-bottom: 10px;
  }

  .input-group label {
    display: block;
    font-size: 0.78rem;
    color: var(--muted);
    margin-bottom: 3px;
  }

  .input-group input {
    width: 100%;
    padding: 5px 8px;
    border: 1px solid var(--border);
    border-radius: 4px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.88rem;
    background: var(--bg);
    color: var(--text);
  }

  .input-group input:focus {
    outline: none;
    border-color: var(--accent);
  }

  .divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 14px 0;
  }

  .stat {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 5px 0;
    border-bottom: 1px dashed var(--border);
  }

  .stat:last-child { border-bottom: none; }

  .stat-label {
    font-size: 0.78rem;
    color: var(--muted);
  }

  .stat-value {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.92rem;
    font-weight: 600;
  }

  /* ── Right side ── */
  .right {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .graphs-row {
    display: flex;
    gap: 20px;
  }

  .graph-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px 10px;
    flex: 1;
  }

  .flot-graph {
    width: 100%;
    height: 180px;
  }

  /* ── Installation visual ── */
  .installation-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
  }

  .installation-inner {
    display: flex;
    gap: 24px;
    align-items: flex-end;
  }

  .install-svg {
    flex: 1;
  }

  .wp-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }

  .power-badge {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.82rem;
    background: var(--accent);
    color: white;
    padding: 3px 8px;
    border-radius: 20px;
    white-space: nowrap;
  }

  .legend {
    display: flex;
    gap: 14px;
    margin-top: 6px;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 0.72rem;
    color: var(--muted);
  }

  .legend-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }
</style>
</head>

<body>
<div id="app">

  <h2>Stooklijn + Warmtepomp Simulator</h2>

  <div class="container">

    <!-- ── Inputs ── -->
    <div class="inputs">
      <h3>Parameters</h3>

      <div class="input-group">
        <label>Buitentemp. max (°C)</label>
        <input type="number" v-model.number="outside_temp_max" @input="update">
      </div>
      <div class="input-group">
        <label>Vertrektemp. max (°C)</label>
        <input type="number" v-model.number="flow_temp_max" @input="update">
      </div>
      <div class="input-group">
        <label>Buitentemp. stop (°C)</label>
        <input type="number" v-model.number="outside_temp_stop" @input="update">
      </div>
      <div class="input-group">
        <label>Vertrektemp. stop (°C)</label>
        <input type="number" v-model.number="flow_temp_stop" @input="update">
      </div>

      <hr class="divider">

      <div class="input-group">
        <label>Warmteverlies (kW)</label>
        <input type="number" v-model.number="heat_loss" @input="update">
      </div>
      <div class="input-group">
        <label>WP vermogen (kW)</label>
        <input type="number" v-model.number="hp_power" @input="update">
      </div>
      <div class="input-group">
        <label>Min modulatie (0–1)</label>
        <input type="number" step="0.05" v-model.number="min_mod" @input="update">
      </div>
      <div class="input-group">
        <label>Buitentemperatuur (°C)</label>
        <input type="number" v-model.number="outside_temp" @input="update">
      </div>

      <hr class="divider">

      <div class="stat">
        <span class="stat-label">Vermogen</span>
        <span class="stat-value">{{ currentPower.toFixed(2) }} kW</span>
      </div>
      <div class="stat">
        <span class="stat-label">Aanvoertemp.</span>
        <span class="stat-value">{{ currentFlow.toFixed(1) }} °C</span>
      </div>
      <div class="stat">
        <span class="stat-label">COP</span>
        <span class="stat-value">{{ currentCOP.toFixed(2) }}</span>
      </div>
    </div>

    <!-- ── Right side ── -->
    <div class="right">

      <!-- graphs row 1: stooklijn + vermogen -->
      <div class="graphs-row">
        <div class="graph-card">
          <h3>Stooklijn</h3>
          <div id="graph" class="flot-graph"></div>
          <div class="legend">
            <div class="legend-item"><div class="legend-dot" style="background:#27ae60"></div> Modulerend</div>
            <div class="legend-item"><div class="legend-dot" style="background:#e67e22"></div> Min. vermogen</div>
            <div class="legend-item"><div class="legend-dot" style="background:#c0392b"></div> Overvraagd</div>
          </div>
        </div>
        <div class="graph-card">
          <h3>Vermogen (kW)</h3>
          <div id="powergraph" class="flot-graph"></div>
        </div>
      </div>

      <!-- graphs row 2: COP + installation -->
      <div class="graphs-row">
        <div class="graph-card">
          <h3>COP</h3>
          <div id="copgraph" class="flot-graph"></div>
        </div>

        <!-- Installation visual -->
        <div class="installation-card" style="flex:1">
          <h3>Installatie</h3>
          <div class="installation-inner">

            <!-- House with emitter SVG -->
            <svg class="install-svg" viewBox="0 0 260 250" xmlns="http://www.w3.org/2000/svg">
              <!-- House body -->
              <rect x="20" y="105" width="220" height="130" fill="#fdf9f3" stroke="#555" stroke-width="2"/>
              <!-- Roof -->
              <polygon points="10,105 130,32 250,105" fill="#e8e0d5" stroke="#555" stroke-width="2"/>

              <!-- Radiator P&ID (shown when system=rad) -->
              <g v-if="system==='rad'">
                <rect x="50" y="143" width="100" height="44" fill="none" stroke="#3a7abf" stroke-width="1.8" rx="2"/>
                <line x1="66"  y1="143" x2="66"  y2="187" stroke="#3a7abf" stroke-width="1.4"/>
                <line x1="82"  y1="143" x2="82"  y2="187" stroke="#3a7abf" stroke-width="1.4"/>
                <line x1="98"  y1="143" x2="98"  y2="187" stroke="#3a7abf" stroke-width="1.4"/>
                <line x1="114" y1="143" x2="114" y2="187" stroke="#3a7abf" stroke-width="1.4"/>
                <line x1="130" y1="143" x2="130" y2="187" stroke="#3a7abf" stroke-width="1.4"/>
                <line x1="50" y1="165" x2="150" y2="165" stroke="#3a7abf" stroke-width="1.0" stroke-dasharray="3 2"/>
                <line x1="50"  y1="154" x2="35"  y2="154" stroke="#3a7abf" stroke-width="1.8"/>
                <line x1="50"  y1="176" x2="35"  y2="176" stroke="#3a7abf" stroke-width="1.8"/>
                <text x="100" y="205" text-anchor="middle" font-size="10" fill="#3a7abf" font-family="IBM Plex Mono,monospace">radiator</text>
              </g>

              <!-- Vloerverwarming: spiraalvorm op dezelfde hoogte als radiator -->
              <g v-if="system==='vloer'">
                <!--
                  Spiraal: concentrische rechthoeken die steeds kleiner worden,
                  verbonden als één doorlopende lijn — klassiek P&ID vloerverwarming symbool.
                  Middelpunt: cx=100, cy=165. Buitenste lus: 96×38, binnenste: 20×8
                -->
                <!-- Buitenste lus -->
                <polyline fill="none" stroke="#c08040" stroke-width="1.6" stroke-linejoin="round"
                  points="52,146 52,184 148,184 148,146 60,146"/>
                <!-- 2e lus -->
                <polyline fill="none" stroke="#c08040" stroke-width="1.6" stroke-linejoin="round"
                  points="60,146 60,176 140,176 140,154 68,154"/>
                <!-- 3e lus -->
                <polyline fill="none" stroke="#c08040" stroke-width="1.6" stroke-linejoin="round"
                  points="68,154 68,168 132,168 132,162 76,162"/>
                <!-- binnenste segment -->
                <polyline fill="none" stroke="#c08040" stroke-width="1.6" stroke-linejoin="round"
                  points="76,162 76,162 100,162"/>
                <!-- aanvoer-stub links (boven) -->
                <line x1="52" y1="153" x2="35" y2="153" stroke="#c08040" stroke-width="1.8"/>
                <!-- retour-stub links (onder, de buitenste lus begint hier) -->
                <line x1="52" y1="177" x2="35" y2="177" stroke="#c08040" stroke-width="1.8"/>
                <text x="100" y="205" text-anchor="middle" font-size="10" fill="#c08040" font-family="IBM Plex Mono,monospace">vloerverwarming</text>
              </g>

              <!-- Outdoor temp label -->
              <text x="130" y="24" text-anchor="middle" font-size="10" fill="#888" font-family="IBM Plex Mono, monospace">{{ outside_temp }}°C buiten</text>
            </svg>

            <!-- Heat pump P&ID symbol + badge -->
            <div class="wp-wrap">
              <!--
                Kringloop met rechte hoeken (met de klok mee):
                  Compressor  midden boven   cx=160 cy=52   (rand L x=136, rand R x=184)
                  Condensor   rechts midden  rect x=236..300, cy=125  (top y=105, bot y=145)
                  EV          midden onder   centrum x=160 y=198
                  Verdamper   links midden   rect x=20..84,  cy=125  (top y=105, bot y=145)

                Leidingen (L-vormen, rechte hoeken):
                  comp→cond  : (184,52)→(268,52)→(268,105)        rood
                  cond→EV    : (268,145)→(268,198)→(180,198)       rood
                  EV→verd    : (140,198)→(52,198)→(52,145)         blauw
                  verd→comp  : (52,105)→(52,52)→(136,52)           blauw
              -->
              <svg width="100%" viewBox="0 0 340 280" xmlns="http://www.w3.org/2000/svg">

                <!-- ══ LEIDINGEN MET RECHTE HOEKEN (vóór componenten tekenen) ══ -->

                <!-- comp → condensor: rechts uit comp → horizontaal → neer naar condensor top -->
                <polyline points="184,52 268,52 268,105"
                  fill="none" stroke="#c0392b" stroke-width="1.5" stroke-linejoin="round"/>

                <!-- condensor → EV: onder condensor → neer → horizontaal naar EV rechts -->
                <polyline points="268,145 268,198 180,198"
                  fill="none" stroke="#c0392b" stroke-width="1.5" stroke-linejoin="round"/>

                <!-- EV → verdamper: EV links → horizontaal → omhoog naar verdamper onder -->
                <polyline points="140,198 52,198 52,145"
                  fill="none" stroke="#2471a3" stroke-width="1.5" stroke-linejoin="round"/>

                <!-- verdamper → comp: verdamper top → omhoog → horizontaal naar comp links -->
                <polyline points="52,105 52,52 136,52"
                  fill="none" stroke="#2471a3" stroke-width="1.5" stroke-linejoin="round"/>

                <!-- ══ STROOMRICHTINGSPIJLTJES ══ -->
                <!-- comp→cond: horizontaal naar rechts, midden bovenlijn x≈226 y=52 -->
                <polygon points="224,49 230,52 224,55" fill="#c0392b"/>
                <!-- comp→cond: verticaal naar onder, midden rechter zijlijn x=268 y≈79 -->
                <polygon points="265,76 268,82 271,76" fill="#c0392b"/>
                <!-- cond→EV: verticaal naar onder, x=268 y≈171 -->
                <polygon points="265,168 268,174 271,168" fill="#c0392b"/>
                <!-- cond→EV: horizontaal naar links, y=198 x≈224 -->
                <polygon points="228,195 222,198 228,201" fill="#c0392b"/>
                <!-- EV→verd: horizontaal naar links, y=198 x≈96 -->
                <polygon points="100,195 94,198 100,201" fill="#2471a3"/>
                <!-- EV→verd: verticaal naar boven, x=52 y≈171 -->
                <polygon points="49,174 52,168 55,174" fill="#2471a3"/>
                <!-- verd→comp: verticaal naar boven, x=52 y≈79 -->
                <polygon points="49,82 52,76 55,82" fill="#2471a3"/>
                <!-- verd→comp: horizontaal naar rechts, y=52 x≈88 -->
                <polygon points="86,49 92,52 86,55" fill="#2471a3"/>

                <!-- ══ COMPRESSOR (cirkel met twee schuine lijnen, punt rechts) ══ -->
                <circle cx="160" cy="52" r="24" fill="#f4f1ec" stroke="#444" stroke-width="1.8"/>
                <line x1="140" y1="40" x2="184" y2="52" stroke="#444" stroke-width="1.6" stroke-linecap="round"/>
                <line x1="140" y1="64" x2="184" y2="52" stroke="#444" stroke-width="1.6" stroke-linecap="round"/>
                <!-- status LED -->
                <circle cx="174" cy="32" r="4" :fill="currentPower > 0 ? '#27ae60' : '#aaa'"/>
                <text x="160" y="12" text-anchor="middle" font-size="9" fill="#555" font-family="IBM Plex Mono,monospace">compressor</text>

                <!-- ══ CONDENSOR (rechts, rood) ══ -->
                <rect x="236" y="105" width="64" height="40" fill="none" stroke="#c0392b" stroke-width="1.8" rx="2"/>
                <line x1="249" y1="105" x2="249" y2="145" stroke="#c0392b" stroke-width="1.3"/>
                <line x1="262" y1="105" x2="262" y2="145" stroke="#c0392b" stroke-width="1.3"/>
                <line x1="275" y1="105" x2="275" y2="145" stroke="#c0392b" stroke-width="1.3"/>
                <line x1="288" y1="105" x2="288" y2="145" stroke="#c0392b" stroke-width="1.3"/>
                <!-- aanvoerleiding naar huis met pomp ertussen -->
                <!-- lijn condensor → pomp -->
                <line x1="300" y1="115" x2="310" y2="115" stroke="#c0392b" stroke-width="1.8"/>
                <!-- P&ID circulatiepomp: cirkel met driehoek (punt rechts = persrichting) -->
                <circle cx="320" cy="115" r="9" fill="#f4f1ec" stroke="#c0392b" stroke-width="1.5"/>
                <polygon points="313,120 313,110 329,115" fill="#c0392b" stroke="#c0392b" stroke-width="1.3" stroke-linejoin="round"/>
                <!-- lijn pomp → huis stub -->
                <line x1="329" y1="115" x2="338" y2="115" stroke="#c0392b" stroke-width="1.8"/>
                <!-- retour stub (onderste lijn, geen pomp) -->
                <line x1="300" y1="135" x2="338" y2="135" stroke="#c0392b" stroke-width="1.8"/>
                <polygon points="332,132 338,135 332,138" fill="#c0392b"/>
                <text x="268" y="160" text-anchor="middle" font-size="9" fill="#c0392b" font-family="IBM Plex Mono,monospace">condensor</text>
                <text x="322" y="148" text-anchor="middle" font-size="8" fill="#c0392b" font-family="IBM Plex Mono,monospace">huis</text>

                <!-- ══ EXPANSIEVENTIEL (midden onder) ══ -->
                <polygon points="140,188 140,208 160,198" fill="#555"/>
                <polygon points="180,188 180,208 160,198" fill="#555"/>
                <line x1="140" y1="198" x2="180" y2="198" stroke="#f4f1ec" stroke-width="0.8"/>
                <text x="160" y="222" text-anchor="middle" font-size="9" fill="#555" font-family="IBM Plex Mono,monospace">exp.ventiel</text>

                <!-- ══ VERDAMPER 90° gedraaid (links, blauw) ══
                     Vinnen horizontaal (lucht stroomt van links naar rechts).
                     Rect x=20..84, y=105..145.
                     Vinnen = horizontale lijnen op vaste y-posities.
                     Luchtpijltjes aan linkerrand → richting rechts.
                     Ventilator P&ID rechts van de verdamper (cx=96, cy=125).
                -->
                <rect x="20" y="105" width="64" height="40" fill="none" stroke="#2471a3" stroke-width="1.8" rx="2"/>
                <!-- horizontale vinnen -->
                <line x1="20" y1="115" x2="84" y2="115" stroke="#2471a3" stroke-width="1.3"/>
                <line x1="20" y1="125" x2="84" y2="125" stroke="#2471a3" stroke-width="1.3"/>
                <line x1="20" y1="135" x2="84" y2="135" stroke="#2471a3" stroke-width="1.3"/>
                <!-- lucht-instub links (4 lijntjes die uit de linkerrand steken) -->
                <line x1="5"  y1="112" x2="20" y2="112" stroke="#2471a3" stroke-width="1.4"/>
                <line x1="5"  y1="120" x2="20" y2="120" stroke="#2471a3" stroke-width="1.4"/>
                <line x1="5"  y1="128" x2="20" y2="128" stroke="#2471a3" stroke-width="1.4"/>
                <line x1="5"  y1="136" x2="20" y2="136" stroke="#2471a3" stroke-width="1.4"/>
                <!-- pijltjes naar rechts (lucht stroomt door de verdamper van links naar rechts) -->
                <polygon points="5,109 10,112 5,115"  fill="#2471a3"/>
                <polygon points="5,117 10,120 5,123"  fill="#2471a3"/>
                <polygon points="5,125 10,128 5,131"  fill="#2471a3"/>
                <polygon points="5,133 10,136 5,139"  fill="#2471a3"/>
                <text x="52" y="158" text-anchor="middle" font-size="9" fill="#2471a3" font-family="IBM Plex Mono,monospace">verdamper</text>

                <!-- ══ VENTILATOR (cirkel met 3 gebogen bladen) ══ -->
                <circle cx="97" cy="125" r="11" fill="#f4f1ec" stroke="#2471a3" stroke-width="1.5"/>
                <!-- centrale as -->
                <circle cx="97" cy="125" r="2" fill="#2471a3"/>
                <!-- blad 1: rechtsboven -->
                <path d="M97,125 Q101,118 97,115 Q93,118 97,125" fill="#2471a3" stroke="none"/>
                <!-- blad 2: linksonder -->
                <path d="M97,125 Q93,132 97,135 Q101,132 97,125" fill="#2471a3" stroke="none"/>
                <!-- blad 3: linksboven -->
                <path d="M97,125 Q90,122 88,126 Q91,130 97,125" fill="#2471a3" stroke="none"/>
                <!-- blad 4: rechtsonder -->
                <path d="M97,125 Q104,128 106,124 Q103,120 97,125" fill="#2471a3" stroke="none"/>
                <text x="97" y="143" text-anchor="middle" font-size="8" fill="#2471a3" font-family="IBM Plex Mono,monospace">vent.</text>

              </svg>

              <div class="power-badge">{{ currentPower.toFixed(2) }} kW</div>

              <!-- System toggle -->
              <div style="margin-top:10px; font-size:0.76rem; color:var(--muted); text-align:center;">
                <label style="cursor:pointer;">
                  <input type="radio" v-model="system" value="rad" @change="switchSystem('rad')"> Radiatoren
                </label>
                &nbsp;
                <label style="cursor:pointer;">
                  <input type="radio" v-model="system" value="vloer" @change="switchSystem('vloer')"> Vloer
                </label>
              </div>
            </div>

          </div>
        </div>
      </div>

    </div><!-- end right -->

  </div><!-- end container -->

</div><!-- end app -->

<div id="tooltip" style="display:none; position:absolute; border:1px solid #ccc; background:#fff; padding:5px 8px; font-size:0.8rem; border-radius:4px; pointer-events:none; font-family:'IBM Plex Mono',monospace;"></div>

<script>
new Vue({
  el: "#app",
  data: {
    outside_temp_max: -7,
    flow_temp_max: 55,
    outside_temp_stop: 16.5,
    flow_temp_stop: 20,

    heat_loss: 6,
    room: 20,
    outside_temp: -7,

    hp_power: 5,
    min_mod: 0.3,

    currentPower: 0,
    currentFlow: 0,
    currentCOP: 0,

    system: "rad"
  },

  methods: {
    switchSystem(sys) {
      this.flow_temp_max = (sys === 'vloer') ? 35 : 55;
      this.update();
    },

    update() {
      const slope = (this.flow_temp_stop - this.flow_temp_max) /
                    (this.outside_temp_stop - this.outside_temp_max);

      const HTC = this.heat_loss / (this.room - this.outside_temp_max);

      const Qmin = this.hp_power * this.min_mod;
      const Qmax = this.hp_power;

      let stooklijnSeries = [];
      let currentSeries = { data: [], color: "" };

      let power = [], cop = [];

      for (let T = -10; T <= 20; T += 0.5) {
        let flow;
        if (T <= this.outside_temp_max)        flow = this.flow_temp_max;
        else if (T >= this.outside_temp_stop)  flow = this.flow_temp_stop;
        else flow = this.flow_temp_max + slope * (T - this.outside_temp_max);

        const Q_demand = HTC * (this.room - T);

        let Q_wp;
        if      (Q_demand < Qmin) Q_wp = Qmin;
        else if (Q_demand > Qmax) Q_wp = Qmax;
        else                      Q_wp = Q_demand;

        const COP = 7 - 0.08 * flow;

        if (Math.abs(T - this.outside_temp) < 0.26) {
          this.currentPower = Q_wp;
          this.currentFlow  = flow;
          this.currentCOP   = COP;
        }

        let color;
        if      (Q_demand > Qmax) color = "#c0392b";
        else if (Q_demand < Qmin) color = "#e67e22";
        else                      color = "#27ae60";

        if (currentSeries.color !== color) {
          if (currentSeries.data.length > 0) stooklijnSeries.push(currentSeries);
          currentSeries = { data: [], color: color };
        }
        currentSeries.data.push([T, flow]);

        power.push([T, Q_wp]);
        cop.push([T, COP]);
      }
      stooklijnSeries.push(currentSeries);

      const xaxisOptions = {
        transform: v => -v,
        inverseTransform: v => -v
      };

      const commonOpts = {
        series: { lines: { show: true, lineWidth: 2 } },
        grid:   { hoverable: true, borderWidth: 1, borderColor: "#d0c9bb", backgroundColor: "#fafaf7" },
        xaxis:  xaxisOptions,
        yaxis:  { font: { size: 10, family: "IBM Plex Mono" } }
      };

      $.plot("#graph", stooklijnSeries.map(s => ({
        data: s.data,
        color: s.color
      })), commonOpts);

      $.plot("#powergraph", [
        { data: power,                              color: "#7b2fbe" },
        { data: [[-10, Qmin], [20, Qmin]],          color: "#e67e22", lines: { lineWidth: 1, dashStyle: "dash" } },
        { data: [[-10, Qmax], [20, Qmax]],          color: "#c0392b", lines: { lineWidth: 1 } }
      ], commonOpts);

      $.plot("#copgraph", [
        { data: cop, color: "#2471a3" }
      ], commonOpts);
    }
  },

  mounted() {
    this.update();

    $("#graph, #powergraph, #copgraph").bind("plothover", function(e, pos, item) {
      if (item) {
        $("#tooltip")
          .html(item.datapoint[1].toFixed(1) + " @ " + item.datapoint[0].toFixed(1) + "°C")
          .css({ top: item.pageY + 8, left: item.pageX + 8 })
          .show();
      } else {
        $("#tooltip").hide();
      }
    });
  }
});
</script>
</body>
</html>
