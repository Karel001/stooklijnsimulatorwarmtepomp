<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Stooklijn + Warmtepomp Simulator</title>

<script src="https://cdn.jsdelivr.net/npm/vue@2"></script>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/flot/0.8.3/jquery.flot.min.js"></script>

<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;600&family=IBM+Plex+Mono&display=swap');

  :root {
    --bg: #f4f1ec;
    --panel: #ffffff;
    --border: #d0c9bb;
    --text: #1a1a1a;
    --accent: #c0392b;
    --green: #27ae60;
    --orange: #e67e22;
    --muted: #7a7060;
    --radius: 6px;
  }

  * { box-sizing: border-box; }

  body {
    font-family: 'IBM Plex Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    margin: 0;
    padding: 24px;
  }

  h2 {
    font-size: 1.3rem;
    font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    border-bottom: 2px solid var(--accent);
    padding-bottom: 8px;
    margin-bottom: 20px;
    color: var(--accent);
  }

  h3 {
    font-size: 0.75rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    margin: 0 0 6px;
  }

  .container {
    display: flex;
    gap: 28px;
    align-items: flex-start;
  }

  .inputs {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    min-width: 210px;
  }

  .input-group {
    margin-bottom: 10px;
  }

  .input-group label {
    display: block;
    font-size: 0.78rem;
    color: var(--muted);
    margin-bottom: 3px;
  }

  .input-group input {
    width: 100%;
    padding: 5px 8px;
    border: 1px solid var(--border);
    border-radius: 4px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.88rem;
    background: var(--bg);
    color: var(--text);
  }

  .input-group input:focus {
    outline: none;
    border-color: var(--accent);
  }

  .divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 14px 0;
  }

  .stat {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 5px 0;
    border-bottom: 1px dashed var(--border);
  }

  .stat:last-child { border-bottom: none; }

  .stat-label {
    font-size: 0.78rem;
    color: var(--muted);
  }

  .stat-value {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.92rem;
    font-weight: 600;
  }

  .right {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .graphs-row {
    display: flex;
    gap: 20px;
  }

  .graph-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px 10px;
    flex: 1;
  }

  .flot-graph {
    width: 100%;
    height: 180px;
  }

  .installation-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
  }

  .installation-inner {
    display: flex;
    gap: 24px;
    align-items: flex-end;
  }

  .install-svg {
    flex: 1;
  }

  .wp-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }

  .power-badge {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.82rem;
    background: var(--accent);
    color: white;
    padding: 3px 8px;
    border-radius: 20px;
    white-space: nowrap;
  }

  .legend {
    display: flex;
    gap: 14px;
    margin-top: 6px;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 0.72rem;
    color: var(--muted);
  }

  .legend-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  #tooltip {
    display: none;
    position: absolute;
    border: 1px solid #ccc;
    background: #fff;
    padding: 5px 8px;
    font-size: 0.8rem;
    border-radius: 4px;
    pointer-events: none;
    font-family: 'IBM Plex Mono', monospace;
    z-index: 1000;
  }
</style>
</head>

<body>

<div id="app">

  <h2>Stooklijn + Warmtepomp Simulator</h2>

  <div class="container">

    <div class="inputs">
      <h3>Parameters</h3>

      <div class="input-group">
        <label>Buitentemp. max (°C)</label>
        <input type="number" v-model.number="outside_temp_max" @input="update">
      </div>
      <div class="input-group">
        <label>Vertrektemp. max (°C)</label>
        <input type="number" v-model.number="flow_temp_max" @input="update">
      </div>
      <div class="input-group">
        <label>Buitentemp. stop (°C)</label>
        <input type="number" v-model.number="outside_temp_stop" @input="update">
      </div>
      <div class="input-group">
        <label>Vertrektemp. stop (°C)</label>
        <input type="number" v-model.number="flow_temp_stop" @input="update">
      </div>

      <hr class="divider">

      <div class="input-group">
        <label>Warmteverlies (kW)</label>
        <input type="number" v-model.number="heat_loss" @input="update">
      </div>
      <div class="input-group">
        <label>WP vermogen (kW)</label>
        <input type="number" v-model.number="hp_power" @input="update">
      </div>
      <div class="input-group">
        <label>Min modulatie (0–1)</label>
        <input type="number" step="0.05" v-model.number="min_mod" @input="update">
      </div>
      <div class="input-group">
        <label>Buitentemperatuur (°C)</label>
        <input type="number" v-model.number="outside_temp" @input="update">
      </div>

      <hr class="divider">

      <div class="stat">
        <span class="stat-label">Vermogen</span>
        <span class="stat-value">{{ currentPower.toFixed(2) }} kW</span>
      </div>
      <div class="stat">
        <span class="stat-label">Aanvoertemp.</span>
        <span class="stat-value">{{ currentFlow.toFixed(1) }} °C</span>
      </div>
      <div class="stat">
        <span class="stat-label">COP</span>
        <span class="stat-value">{{ currentCOP.toFixed(2) }}</span>
      </div>
    </div>

    <div class="right">
      <div class="graphs-row">
        <div class="graph-card">
          <h3>Stooklijn</h3>
          <div id="graph" class="flot-graph"></div>
          <div class="legend">
            <div class="legend-item"><div class="legend-dot" style="background:#27ae60"></div> Modulerend</div>
            <div class="legend-item"><div class="legend-dot" style="background:#e67e22"></div> Pendelen</div>
            <div class="legend-item"><div class="legend-dot" style="background:#c0392b"></div> Te weinig vermogen</div>
          </div>
        </div>
        <div class="graph-card">
          <h3>Vermogen (kW)</h3>
          <div id="powergraph" class="flot-graph"></div>
        </div>
      </div>

      <div class="graphs-row">
        <div class="graph-card">
          <h3>COP</h3>
          <div id="copgraph" class="flot-graph"></div>
        </div>

        <div class="installation-card" style="flex:1">
          <h3>Installatie</h3>
          <div class="installation-inner">
            <svg class="install-svg" viewBox="0 0 260 250" xmlns="http://www.w3.org/2000/svg">
              <rect x="20" y="105" width="220" height="130" fill="#fdf9f3" stroke="#555" stroke-width="2"/>
              <polygon points="10,105 130,32 250,105" fill="#e8e0d5" stroke="#555" stroke-width="2"/>

              <g v-if="system==='rad'">
                <rect x="50" y="143" width="100" height="44" fill="none" stroke="#3a7abf" stroke-width="1.8" rx="2"/>
                <line x1="66"  y1="143" x2="66"  y2="187" stroke="#3a7abf" stroke-width="1.4"/>
                <line x1="82"  y1="143" x2="82"  y2="187" stroke="#3a7abf" stroke-width="1.4"/>
                <line x1="98"  y1="143" x2="98"  y2="187" stroke="#3a7abf" stroke-width="1.4"/>
                <line x1="114" y1="143" x2="114" y2="187" stroke="#3a7abf" stroke-width="1.4"/>
                <line x1="130" y1="143" x2="130" y2="187" stroke="#3a7abf" stroke-width="1.4"/>
                <line x1="50" y1="165" x2="150" y2="165" stroke="#3a7abf" stroke-width="1.0" stroke-dasharray="3 2"/>
                <line x1="50"  y1="154" x2="35"  y2="154" stroke="#3a7abf" stroke-width="1.8"/>
                <line x1="50"  y1="176" x2="35"  y2="176" stroke="#3a7abf" stroke-width="1.8"/>
                <text x="100" y="205" text-anchor="middle" font-size="10" fill="#3a7abf" font-family="IBM Plex Mono,monospace">radiator</text>
              </g>

              <g v-if="system==='vloer'">
                <rect x="30" y="227" width="200" height="6" fill="#f0e0c0" stroke="#c08040" stroke-width="1.2" rx="1"/>
                <polyline points="45,227 45,220 75,220 75,227" fill="none" stroke="#c08040" stroke-width="1.6"/>
                <polyline points="75,227 75,214 105,214 105,227" fill="none" stroke="#c08040" stroke-width="1.6"/>
                <polyline points="105,227 105,220 135,220 135,227" fill="none" stroke="#c08040" stroke-width="1.6"/>
                <polyline points="135,227 135,214 165,214 165,227" fill="none" stroke="#c08040" stroke-width="1.6"/>
                <polyline points="165,227 165,220 195,220 195,227" fill="none" stroke="#c08040" stroke-width="1.6"/>
                <line x1="35" y1="219" x2="20" y2="219" stroke="#c08040" stroke-width="1.6"/>
                <line x1="35" y1="227" x2="20" y2="227" stroke="#c08040" stroke-width="1.6"/>
                <text x="130" y="244" text-anchor="middle" font-size="10" fill="#c08040" font-family="IBM Plex Mono,monospace">vloerverwarming</text>
              </g>

              <text x="130" y="24" text-anchor="middle" font-size="10" fill="#888" font-family="IBM Plex Mono, monospace">{{ outside_temp }}°C buiten</text>
            </svg>

            <div class="wp-wrap">
              <svg width="120" height="220" viewBox="0 0 120 220" xmlns="http://www.w3.org/2000/svg">
                <rect x="25" y="10" width="70" height="32" fill="none" stroke="#c0392b" stroke-width="1.6" rx="2"/>
                <line x1="37" y1="10" x2="37" y2="42" stroke="#c0392b" stroke-width="1.2"/>
                <line x1="49" y1="10" x2="49" y2="42" stroke="#c0392b" stroke-width="1.2"/>
                <line x1="61" y1="10" x2="61" y2="42" stroke="#c0392b" stroke-width="1.2"/>
                <line x1="73" y1="10" x2="73" y2="42" stroke="#c0392b" stroke-width="1.2"/>
                <line x1="85" y1="10" x2="85" y2="42" stroke="#c0392b" stroke-width="1.2"/>
                <line x1="95" y1="20" x2="112" y2="20" stroke="#c0392b" stroke-width="1.6"/>
                <line x1="95" y1="32" x2="112" y2="32" stroke="#c0392b" stroke-width="1.6"/>
                <polygon points="108,17 112,20 108,23" fill="#c0392b"/>
                <text x="60" y="7" text-anchor="middle" font-size="8" fill="#c0392b" font-family="IBM Plex Mono,monospace">condensor</text>

                <line x1="60" y1="42" x2="60" y2="70" stroke="#555" stroke-width="1.4"/>

                <circle cx="60" cy="95" r="26" fill="#f4f1ec" stroke="#444" stroke-width="1.8"/>
                <polygon points="44,108 44,82 76,95" fill="none" stroke="#444" stroke-width="1.6" stroke-linejoin="round"/>
                <circle cx="60" cy="95" r="2.5" fill="#444"/>
                <circle cx="76" cy="72" r="4" :fill="currentPower > 0 ? '#27ae60' : '#aaa'"/>

                <line x1="60" y1="121" x2="60" y2="148" stroke="#555" stroke-width="1.4"/>

                <rect x="25" y="148" width="70" height="32" fill="none" stroke="#2471a3" stroke-width="1.6" rx="2"/>
                <line x1="37" y1="148" x2="37" y2="180" stroke="#2471a3" stroke-width="1.2"/>
                <line x1="49" y1="148" x2="49" y2="180" stroke="#2471a3" stroke-width="1.2"/>
                <line x1="61" y1="148" x2="61" y2="180" stroke="#2471a3" stroke-width="1.2"/>
                <line x1="73" y1="148" x2="73" y2="180" stroke="#2471a3" stroke-width="1.2"/>
                <line x1="85" y1="148" x2="85" y2="180" stroke="#2471a3" stroke-width="1.2"/>
                <line x1="8"  y1="158" x2="25" y2="158" stroke="#2471a3" stroke-width="1.6"/>
                <line x1="8"  y1="170" x2="25" y2="170" stroke="#2471a3" stroke-width="1.6"/>
                <polygon points="12,155 8,158 12,161" fill="#2471a3"/>
                <text x="60" y="195" text-anchor="middle" font-size="8" fill="#2471a3" font-family="IBM Plex Mono,monospace">verdamper</text>

                <line x1="100" y1="26" x2="108" y2="26" stroke="#888" stroke-width="1.2"/>
                <line x1="108" y1="26" x2="108" y2="200" stroke="#888" stroke-width="1.2"/>
                <line x1="108" y1="200" x2="25"  y2="200" stroke="#888" stroke-width="1.2"/>
                <polygon points="76,196 84,196 80,204" fill="#888"/>
                <polygon points="84,196 76,196 80,188" fill="#888"/>
                <text x="108" y="208" text-anchor="middle" font-size="7" fill="#888" font-family="IBM Plex Mono,monospace">EV</text>
              </svg>

              <div class="power-badge">{{ currentPower.toFixed(2) }} kW</div>

              <div style="margin-top:10px; font-size:0.76rem; color:var(--muted); text-align:center;">
                <label style="cursor:pointer;">
                  <input type="radio" v-model="system" value="rad" @change="update"> Radiatoren
                </label>
                &nbsp;
                <label style="cursor:pointer;">
                  <input type="radio" v-model="system" value="vloer" @change="update"> Vloer
                </label>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="tooltip"></div>

<script>
new Vue({
  el: "#app",
  data: {
    outside_temp_max: -7,
    flow_temp_max: 55,
    outside_temp_stop: 16.5,
    flow_temp_stop: 20,

    heat_loss: 6,
    room: 20,
    outside_temp: -7,

    hp_power: 8,
    min_mod: 0.3,

    currentPower: 0,
    currentFlow: 0,
    currentCOP: 0,

    system: "rad"
  },

  methods: {
    update() {
      const slope = (this.flow_temp_stop - this.flow_temp_max) /
                    (this.outside_temp_stop - this.outside_temp_max);

      const HTC = this.heat_loss / (this.room - this.outside_temp_max);

      const Qmin = this.hp_power * this.min_mod;
      const Qmax = this.hp_power;

      let stooklijnSeries = [];
      let currentSeries = { data: [], color: "" };

      let power = [], cop = [];

      for (let T = -10; T <= 20; T += 0.5) {
        let flow;
        if (T <= this.outside_temp_max)        flow = this.flow_temp_max;
        else if (T >= this.outside_temp_stop)  flow = this.flow_temp_stop;
        else flow = this.flow_temp_max + slope * (T - this.outside_temp_max);

        const Q_demand = HTC * (this.room - T);

        let Q_wp;
        if      (Q_demand < Qmin) Q_wp = Qmin;
        else if (Q_demand > Qmax) Q_wp = Qmax;
        else                      Q_wp = Q_demand;

        const COP = 7 - 0.08 * flow;

        if (Math.abs(T - this.outside_temp) < 0.26) {
          this.currentPower = Q_wp;
          this.currentFlow  = flow;
          this.currentCOP   = COP;
        }

        let color;
        if      (Q_demand > Qmax) color = "#c0392b";
        else if (Q_demand < Qmin) color = "#e67e22";
        else                      color = "#27ae60";

        if (currentSeries.color !== color) {
          if (currentSeries.data.length > 0) stooklijnSeries.push(currentSeries);
          currentSeries = { data: [], color: color };
        }
        currentSeries.data.push([T, flow]);

        power.push([T, Q_wp]);
        cop.push([T, COP]);
      }
      stooklijnSeries.push(currentSeries);

      // X-as instellingen
      const xaxisReversed = {
        transform: v => -v,
        inverseTransform: v => -v
      };

      const xaxisNormal = {
        min: -10,
        max: 20
      };

      const commonOpts = {
        series: { lines: { show: true, lineWidth: 2 } },
        grid: { hoverable: true, borderWidth: 1, borderColor: "#d0c9bb", backgroundColor: "#fafaf7" },
        yaxis: { font: { size: 10, family: "IBM Plex Mono" } }
      };

      // Stooklijn (omgekeerde X-as)
      $.plot("#graph", stooklijnSeries.map(s => ({
        data: s.data,
        color: s.color
      })), {
        ...commonOpts,
        xaxis: xaxisReversed
      });

      // Vermogen (normale X-as)
      $.plot("#powergraph", [
        { data: power, color: "#7b2fbe" },
        { data: [[-10, Qmin], [20, Qmin]], color: "#e67e22", lines: { lineWidth: 1, dashStyle: "dash" } },
        { data: [[-10, Qmax], [20, Qmax]], color: "#c0392b", lines: { lineWidth: 1 } }
      ], {
        ...commonOpts,
        xaxis: xaxisNormal
      });

      // COP (omgekeerde X-as)
      $.plot("#copgraph", [{
        data: cop, color: "#2471a3"
      }], {
        ...commonOpts,
        xaxis: xaxisReversed
      });
    }
  },

  mounted() {
    this.update();

    // Hover voor stooklijn en COP (omgekeerde X-as)
    $("#graph, #copgraph").bind("plothover", function(e, pos, item) {
      if (item) {
        let valueText = "";
        if (item.series.color === "#2471a3") {
          valueText = "COP: " + item.datapoint[1].toFixed(2);
        } else {
          valueText = item.datapoint[1].toFixed(1) + " °C";
        }
        $("#tooltip")
          .html(valueText + " @ " + (-item.datapoint[0]).toFixed(1) + "°C")
          .css({ top: item.pageY + 8, left: item.pageX + 8, display: "block" });
      } else {
        $("#tooltip").hide();
      }
    });

    // Hover voor vermogen (normale X-as)
    $("#powergraph").bind("plothover", function(e, pos, item) {
      if (item) {
        $("#tooltip")
          .html(item.datapoint[1].toFixed(2) + " kW @ " + item.datapoint[0].toFixed(1) + "°C")
          .css({ top: item.pageY + 8, left: item.pageX + 8, display: "block" });
      } else {
        $("#tooltip").hide();
      }
    });
  }
});
</script>
</body>
</html>
